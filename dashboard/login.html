<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TINHLE AI - Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-color: #0b1120;
            --card-bg: rgba(15, 23, 42, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.25);
            --red: #ef4444;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Abstract glowing background circles */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            opacity: 0.15;
            z-index: 0;
        }

        .orb-1 {
            top: -10%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 80%);
        }

        .orb-2 {
            bottom: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #8b5cf6 0%, transparent 80%);
        }

        /* Login Card */
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 400px;
            padding: 40px 32px;
            border-radius: 16px;
            z-index: 1;
            animation: cardEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Branding */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .brand-icon {
            background: var(--primary);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 13.5px;
            color: var(--text-muted);
            margin-bottom: 32px;
            text-align: center;
        }

        /* Forms */
        .form-group {
            width: 100%;
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 18px;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px 42px 12px 42px;
            color: var(--text-main);
            font-size: 14px;
            transition: var(--transition-smooth);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
            background: rgba(0, 0, 0, 0.4);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .toggle-password:hover {
            color: var(--text-main);
        }

        /* Button */
        .login-btn {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 12px var(--primary-glow);
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            background: #059669;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        /* Errors and Hints */
        .error-message {
            color: var(--red);
            font-size: 13px;
            margin-top: 8px;
            display: none;
            align-items: center;
            gap: 6px;
            animation: shake 0.3s ease-in-out;
            width: 100%;
        }

        .hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 24px;
            background: rgba(255, 255, 255, 0.02);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="login-card">
        <div class="brand">
            <div class="brand-icon"><i class="ph ph-plant"></i></div>
            <h1>TINHLE AI</h1>
        </div>
        <p class="subtitle">Agricultural Risk Portal</p>

        <form id="login-form" style="width: 100%;">
            <div class="form-group">
                <label class="form-label" for="passcode">Access Passcode</label>
                <div class="input-wrapper">
                    <i class="ph ph-lock input-icon"></i>
                    <input type="password" id="passcode" class="form-input" placeholder="Enter security passcode" required autofocus autocomplete="current-password">
                    <button type="button" id="toggle-passcode" class="toggle-password" aria-label="Toggle password visibility">
                        <i class="ph ph-eye"></i>
                    </button>
                </div>
                <div id="error-container" class="error-message">
                    <i class="ph ph-warning-circle"></i> Invalid passcode. Please try again.
                </div>
            </div>

            <button type="submit" class="login-btn">
                <span>Access Dashboard</span>
                <i class="ph ph-arrow-right"></i>
            </button>
        </form>

        <div class="hint">
            <span>Passcode: <strong>tinhle2026</strong></span>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const passcodeField = document.getElementById('passcode');
        const togglePasscodeBtn = document.getElementById('toggle-passcode');
        const errorContainer = document.getElementById('error-container');

        // Toggle Password visibility
        togglePasscodeBtn.addEventListener('click', () => {
            const isPassword = passcodeField.type === 'password';
            passcodeField.type = isPassword ? 'text' : 'password';
            togglePasscodeBtn.innerHTML = isPassword ? '<i class="ph ph-eye-slash"></i>' : '<i class="ph ph-eye"></i>';
        });

        // Simple auth check without database
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const val = passcodeField.value.trim().toLowerCase();

            if (val === 'tinhle' || val === 'tinhle2026') {
                sessionStorage.setItem('tinhle_logged_in', 'true');
                window.location.href = 'index.html';
            } else {
                errorContainer.style.display = 'flex';
                passcodeField.classList.add('error');
                passcodeField.focus();
                
                // Shake card
                const card = document.querySelector('.login-card');
                card.style.animation = 'none';
                void card.offsetWidth; // Trigger reflow
                card.style.animation = 'shake 0.3s ease-in-out';
            }
        });

        // Hide error when typing
        passcodeField.addEventListener('input', () => {
            errorContainer.style.display = 'none';
            passcodeField.classList.remove('error');
        });
    </script>
</body>
</html>
